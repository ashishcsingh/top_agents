name: Autonomous Top 10 Models Agent

on:
  # Run the agent automatically every Wednesday at 12:00 PM UTC (8:00 AM EST)
  schedule:
    - cron: '0 12 * * 3'
  
  # Allow the agent to be triggered manually via a button in the GitHub UI
  workflow_dispatch:

jobs:
  research-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # The agent needs permission to push the updated json registry to the repo
      
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Initialize Agent Environment (Python)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: 📦 Install Agent Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: 🤖 Execute Autonomous AI Models Intelligence Update
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python ai_models_agent.py
        
      - name: 🚀 Commit and Push Updated Registry
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "AI Models Agent"
          
          # Stage the updated model registry
          git add top_10_models.json
          
          # Only commit if a change was actually made
          git diff --staged --quiet || git commit -m "Automated AI Models Update: $(date +'%Y-%m-%d')"
          git push
